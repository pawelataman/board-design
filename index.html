<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/png" href="/favicon.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>BoardCraft — 3D Snowboard Designer</title>
    <!-- GitHub Pages SPA redirect handler (restores path from 404.html redirect) -->
    <script>
      !function(l){if(l.search[1]==='/'){window.history.replaceState(null,null,l.pathname.slice(0,-1)+l.search.slice(1).split('&').map(function(s){return s.replace(/~and~/g,'&')}).join('?')+l.hash)}}(window.location);
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
